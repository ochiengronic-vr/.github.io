<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
overflow-x:hidden;
color:white;
}

/* Animated Background */
body::before{
content:'';
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(circle,#ff4da688 0%,transparent 60%),
radial-gradient(circle,#ff77ff55 0%,transparent 60%);
animation:bgMove 15s linear infinite alternate;
filter:blur(60px);
z-index:-2;
}

@keyframes bgMove{
from{
transform:translate(-100px,-80px);
}
to{
transform:translate(120px,80px);
}
}

/* Floating Hearts */

.hearts{
position:fixed;
width:100%;
height:100%;
pointer-events:none;
overflow:hidden;
z-index:-1;
}

.heart{
position:absolute;
bottom:-60px;
font-size:30px;
color:#ff4d88;
text-shadow:0 0 20px #ff4d88,
0 0 40px #ff4d88,
0 0 60px #ff4d88;
animation:float 10s linear infinite;
}

@keyframes float{

0%{
transform:translateY(0) scale(.7);
opacity:0;
}

20%{
opacity:1;
}

100%{
transform:translateY(-120vh) scale(1.4) rotate(360deg);
opacity:0;
}

}

header{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
padding:20px;
}

header h1{

font-family:"Great Vibes",cursive;
font-size:70px;

color:#fff;

text-shadow:
0 0 10px #ff66cc,
0 0 30px #ff66cc,
0 0 60px #ff66cc;

animation:glow 2s ease-in-out infinite alternate;

}

@keyframes glow{

from{
text-shadow:0 0 10px #ff66cc;
}

to{
text-shadow:
0 0 20px #ff66cc,
0 0 40px #ff66cc,
0 0 80px #ff66cc;
}

}

header p{

margin-top:20px;
font-size:22px;
opacity:.9;

}

.gallery{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(250px,1fr));

gap:30px;

padding:60px;

}

.card{

position:relative;

overflow:hidden;

border-radius:25px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(15px);

transition:.5s;

box-shadow:
0 0 20px rgba(255,100,180,.25);

}

.card:hover{

transform:translateY(-12px) scale(1.03);

box-shadow:
0 0 30px #ff66cc,
0 0 60px #ff66cc;

}

.card img{

width:100%;
height:480px;

object-fit:cover;

display:block;

transition:.6s;

}

.card:hover img{

transform:scale(1.08);

}

.card::before{

content:'❤️';

position:absolute;

top:15px;
right:20px;

font-size:28px;

opacity:0;

transition:.4s;

}

.card:hover::before{

opacity:1;

animation:pulse 1s infinite;

}

@keyframes pulse{

50%{
transform:scale(1.4);
}

}

footer{

padding:50px;

text-align:center;

font-size:26px;

font-family:"Great Vibes",cursive;

color:#ff99dd;

text-shadow:0 0 20px #ff66cc;

}
.dropdown{
    position: relative;
    display: inline-block;
    margin:20px;
}

.dropbtn{
    background:#08e045;
    color:white;
    border:none;
    padding:12px 20px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    border-radius:8px;
}

.dropdown-content{
    display:none;
    position:absolute;
    background:white;
    min-width:180px;
    border-radius:8px;
    overflow:hidden;
    box-shadow:0 8px 20px rgba(0,0,0,.3);
    z-index:100;
}

.dropdown-content a{
    display:block;
    color:#333;
    padding:12px;
    text-decoration:none;
    transition: 3s;
}

.dropdown-content a:hover{
    background:#ff66cc;
    color:white;
}
.dropdown-content a:active{
    background:#08b43f;
    color:rgb(156, 10, 34);
}

.dropdown:hover .dropdown-content{
    display:block;
}
/* Main Dropdown */
.dropdown{
    position:relative;
    display:inline-block;
}

.dropbtn{
    background:#08e045;
    color:white;
    padding:12px 20px;
    border:none;
    cursor:pointer;
    font-size:16px;
}

.dropdown-content{
    display:none;
    position:absolute;
    background:#fff;
    min-width:200px;
    box-shadow:0 8px 16px rgba(0,0,0,.2);
    z-index:100;
}

.dropdown:hover .dropdown-content{
    display:block;
}

.dropdown-content a{
    display:block;
    padding:12px;
    color:#333;
    text-decoration:none;
}

.dropdown-content a:hover{
    background:#f2f2f2;
}

/* Submenu */
.submenu{
    position:relative;
}

.submenu-content{
    display:none;
    position:absolute;
    top:0;
    left:100%;
    min-width:180px;
    background:white;
    box-shadow:0 8px 16px rgba(0,0,0,.2);
}

.submenu:hover .submenu-content{
    display:block;
}

.submenu-content a:hover{
    background:#ff66cc;
    color:white;
}

/* ==========================
   MOBILE RESPONSIVE DESIGN
========================== */

img{
    max-width:100%;
    height:auto;
    display:block;
}

header{
    min-height:100vh;
    padding:20px 15px;
}

header h1{
    font-size:clamp(2.5rem,8vw,4.5rem);
    line-height:1.2;
}

header p{
    font-size:clamp(1rem,4vw,1.4rem);
    max-width:700px;
}

.gallery{
    padding:20px;
    gap:20px;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
}

.card img{
    width:100%;
    height:320px;
    object-fit:cover;
}

.dropdown{
    display:flex;
    justify-content:center;
    width:100%;
    margin:20px 0;
}

.dropbtn{
    width:220px;
    max-width:90%;
    font-size:18px;
}

footer{
    padding:30px 15px;
    font-size:22px;
}

/* Tablets */

@media (max-width:768px){

header h1{
    font-size:50px;
}

.gallery{
    padding:15px;
}

.card img{
    height:280px;
}

.dropdown-content{
    left:50%;
    transform:translateX(-50%);
}

.submenu-content{
    position:relative;
    left:0;
    top:0;
    width:100%;
    box-shadow:none;
    border-top:1px solid #ddd;
}

}

/* Phones */

@media (max-width:480px){

header{
    padding:15px;
}

header h1{
    font-size:38px;
}

header p{
    font-size:16px;
}

.gallery{
    grid-template-columns:1fr;
    padding:12px;
}

.card{
    border-radius:18px;
}

.card img{
    height:250px;
}

.dropbtn{
    width:90%;
    font-size:17px;
    padding:14px;
}

.dropdown-content{
    width:90vw;
}

footer{
    font-size:20px;
}

}

.social-icons {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 20px;
}

.social-icons a {
    width: 50px;
    height: 50px;
    background: #222;
    color: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    text-decoration: none;
    transition: 0.3s ease;
}

.social-icons a:hover {
    transform: translateY(-5px);
}

/* Brand colors on hover */
.social-icons a:nth-child(1):hover {
    background: #1877F2; /* Facebook */
}

.social-icons a:nth-child(2):hover {

}

.social-icons a:nth-child(3):hover {
    background: #E4405F; /* Instagram */
}

.social-icons a:nth-child(4):hover {
    background: #000000; /* TikTok */
}
